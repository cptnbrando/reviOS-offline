---
title: Software
description: Installs preferred software 
privilege: TrustedInstaller
actions:

  # https://github.com/meetrevision/playbook/issues/81
  # - !status: {status: 'Updating Winget'}
  # - !powerShell:
  #   weight: 50
  #   runas: currentUserElevated
  #   wait: true
  #   exeDir: true
  #   command: '.\UPDATE-APPX.ps1'

  - !status: {status: 'Installing Brave from offline .exe', option: "browser-brave"}
  - !run:
    exeDir: true
    exe: "Offline/BraveBrowserStandaloneSetup.exe"
    args: "/silent /install"
    cpuArch: X64
    weight: 150
    option: "browser-brave"

  - !run:
    exeDir: true
    exe: "Offline/BraveBrowserStandaloneSetupArm64.exe"
    args: "/silent /install"
    cpuArch: Arm64
    weight: 150
    option: "browser-brave"

  - !status: {status: 'Configuring Brave', option: "browser-brave"}
  - !cmd:
    exeDir: true
    command: 'robocopy "BraveSoftware" "%ProgramFiles%\BraveSoftware" /E /IM /IT /NP & robocopy "BraveSoftware" "%localappdata%\BraveSoftware" /E /IM /IT /NP'
    ignoreErrors: true
    weight: 20
    option: "browser-brave"

  # Firefox
  - !status: {status: 'Installing Firefox from offline .exe', option: "browser-firefox"}
  - !run:
    exeDir: true
    exe: "Offline/FirefoxBrowserStandaloneSetup.exe"
    args: "/S"
    cpuArch: X64
    weight: 150
    option: "browser-firefox"

  - !run:
    exeDir: true
    exe: "Offline/FirefoxBrowserStandaloneSetupArm64.exe"
    args: "/S"
    cpuArch: Arm64
    weight: 150
    option: "browser-firefox"